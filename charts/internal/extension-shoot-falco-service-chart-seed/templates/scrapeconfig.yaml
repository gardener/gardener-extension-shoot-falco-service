apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  labels:
    prometheus: shoot
  name: shoot-falco
  namespace: {{ .Release.Namespace }}
spec:
  authorization:
    credentials:
      key: token
      name: shoot-access-prometheus-shoot
  honorLabels: false
  kubernetesSDConfigs:
  - apiServer: https://kube-apiserver
    authorization:
      credentials:
        key: token
        name: shoot-access-prometheus-shoot
    namespaces:
      names:
      - kube-system
    role: Endpoints
    tlsConfig:
      ca: {}
      cert: {}
      insecureSkipVerify: true
  relabelings:
  - action: replace
    replacement: shoot
    targetLabel: type
  - action: keep
    regex: falcosidekick;http-notls
    sourceLabels:
    - __meta_kubernetes_service_name
    - __meta_kubernetes_endpoint_port_name
  - action: labelmap
    regex: __meta_kubernetes_service_label_(.+)
  - action: replace
    sourceLabels:
    - __meta_kubernetes_pod_name
    targetLabel: pod
  - action: replace
    sourceLabels:
    - __meta_kubernetes_pod_node_name
    targetLabel: node
  - action: replace
    replacement: kube-apiserver:443
    targetLabel: __address__
  - action: replace
    regex: (.+);(.+)
    replacement: /api/v1/namespaces/kube-system/pods/${1}:${2}/proxy/metrics
    sourceLabels:
    - __meta_kubernetes_pod_name
    - __meta_kubernetes_pod_container_port_number
    targetLabel: __metrics_path__
  scheme: HTTPS
  tlsConfig:
    ca: {}
    cert: {}
    insecureSkipVerify: true
